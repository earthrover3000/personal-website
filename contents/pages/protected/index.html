<style>/* Shared styles for index pages (root, protected, private) */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0f0f;
  color: #e0e0e0;
  font-family: "Segoe UI", system-ui, sans-serif;
  margin: 0;
  padding: 2rem;
  line-height: 1.7;
}

.c { max-width: 800px; margin: 0 auto; }

h1 { font-size: 1.6rem; color: #e0e0e0; margin-bottom: 1.2rem; }

ul { list-style: none; padding: 0; margin: 0; }
li { margin: 0.2rem 0; }

a {
  color: #7c9ef5;
  text-decoration: none;
  font-size: 1.1rem;
  line-height: 1.4;
  display: block;
  padding: 0.35rem 0.8rem;
  border-radius: 6px;
  transition: background 0.15s;
}
a:hover { background: #1a1a1a; text-decoration: underline; }

hr { border: none; border-top: 1px solid #2e2e2e; margin: 1.2rem 0; }

.ts { color: #888; font-size: 0.85em; margin-top: 2em; }

.row { display: flex; gap: 2rem; align-items: flex-start; }
.main { flex: 1; min-width: 0; }
.side { flex: 0 0 50%; }
.side hr { margin: 0.8rem 0; }

@media (max-width: 600px) {
  .row { flex-direction: column; gap: 0; }
  .side { border-top: 1px solid #2e2e2e; padding-top: 1rem; margin-top: 1rem; }
}

@media (prefers-color-scheme: light) {
  body { background: #f5f5f5; color: #1a1a1a; }
  h1 { color: #1a1a1a; }
  a { color: #3a5fd9; }
  a:hover { background: #e8e8e8; }
  hr { border-top-color: #d0d0d0; }
  .side { border-top-color: #d0d0d0; }
}

/* Apps section — installable apps render as cards (icon + name + description + Open). */
.apps { display: flex; flex-direction: column; gap: 0.6rem; margin: 0.4rem 0 1.4rem; }

a.app-card {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 0.7rem 0.9rem;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  font-size: 1rem;
  color: #e0e0e0;
  text-decoration: none;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
}
a.app-card:hover {
  background: #1d1d1d;
  border-color: #5fa8a8;
  text-decoration: none;
  transform: translateY(-1px);
}
.app-card__icon { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; display: block; }
.app-card__body { flex: 1; min-width: 0; }
.app-card__name { font-size: 1.05rem; font-weight: 500; line-height: 1.25; }
.app-card__desc { font-size: 0.85rem; color: #888; margin-top: 0.15rem; line-height: 1.3; }
.app-card__open {
  font-size: 0.8rem;
  color: #7c9ef5;
  border: 1px solid #7c9ef5;
  border-radius: 6px;
  padding: 0.18rem 0.55rem;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

@media (prefers-color-scheme: light) {
  a.app-card { background: #ffffff; border-color: #d8d8d8; color: #1a1a1a; }
  a.app-card:hover { background: #f4f4f4; border-color: #1a5757; }
  .app-card__desc { color: #666; }
  .app-card__open { color: #3a5fd9; border-color: #3a5fd9; }
}
</style>
